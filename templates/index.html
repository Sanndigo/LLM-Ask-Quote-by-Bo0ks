<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 RAG - Поиск по книгам</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #475569;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin-bottom: 30px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            min-width: 150px;
            padding: 15px 25px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .card h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Forms */
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .btn {
            padding: 15px 30px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-input);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
        }

        /* Results */
        .results {
            margin-top: 20px;
        }

        .result-item {
            background: var(--bg-input);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s;
        }

        .result-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.2);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .result-book {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .result-position {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .result-similarity {
            background: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .result-content {
            color: var(--text);
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* Answer */
        .answer-box {
            background: linear-gradient(135deg, var(--bg-input), var(--bg-card));
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
            border: 2px solid var(--primary);
        }

        .answer-text {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .quotes {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--border);
        }

        .quote-item {
            background: var(--bg-input);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid var(--secondary);
        }

        .quote-source {
            color: var(--secondary);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .quote-text {
            color: var(--text-muted);
            font-style: italic;
            line-height: 1.6;
        }

        /* Upload */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .upload-area input {
            display: none;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .book-list {
            margin-top: 20px;
        }

        .book-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--bg-input);
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .book-name {
            font-weight: 500;
        }

        .book-size {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Status */
        .status-bar {
            background: var(--bg-input);
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
        }

        .status-dot.indexing {
            background: var(--warning);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .search-box {
                flex-direction: column;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                width: 100%;
            }
        }

        /* Hidden */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>📚 RAG - Поиск по книгам</h1>
            <p>Интеллектуальный поиск и ответы на вопросы по вашим текстам</p>
        </div>
    </header>

    <div class="container">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Система готова</span>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('search')">🔍 Поиск фрагментов</button>
            <button class="tab-btn" onclick="switchTab('answer')">❓ Ответ на вопрос</button>
            <button class="tab-btn" onclick="switchTab('books')">📖 Книги</button>
        </div>

        <!-- Search Tab -->
        <div id="search-tab" class="tab-content active">
            <div class="card">
                <h2>🔍 Поиск фрагментов текста</h2>
                <div class="search-box">
                    <input type="text" id="searchQuery" placeholder="Например: где Татьяна пишет письмо Онегину..." 
                           onkeypress="if(event.key==='Enter') performSearch()">
                    <button class="btn" onclick="performSearch()" id="searchBtn">Найти</button>
                </div>
                <div id="searchResults" class="results"></div>
            </div>
        </div>

        <!-- Answer Tab -->
        <div id="answer-tab" class="tab-content">
            <div class="card">
                <h2>❓ Ответ на вопрос по книгам</h2>
                <div class="search-box">
                    <input type="text" id="answerQuery" placeholder="Например: Что писала Татьяна Онегину?" 
                           onkeypress="if(event.key==='Enter') getAnswer()">
                    <button class="btn" onclick="getAnswer()" id="answerBtn">Ответить</button>
                </div>
                <div id="answerResult"></div>
            </div>
        </div>

        <!-- Books Tab -->
        <div id="books-tab" class="tab-content">
            <div class="card">
                <h2>📖 Загрузить книгу</h2>
                <div class="upload-area" onclick="document.getElementById('fileInput').click()" 
                     ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                    <input type="file" id="fileInput" accept=".txt" onchange="handleFileSelect(event)">
                    <div class="upload-icon">📁</div>
                    <p><strong>Перетащите файл сюда</strong> или кликните для выбора</p>
                    <p style="color: var(--text-muted); margin-top: 10px;">Только TXT файлы, макс. 16MB</p>
                </div>
                <div id="uploadResult"></div>
            </div>

            <div class="card">
                <h2>📚 Библиотека</h2>
                <button class="btn btn-secondary" onclick="loadBooks()" style="margin-bottom: 15px;">🔄 Обновить список</button>
                <div id="bookList" class="book-list"></div>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');
        }

        // Search
        async function performSearch() {
            const query = document.getElementById('searchQuery').value.trim();
            if (!query) return;

            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>';

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, k: 5 })
                });

                const data = await response.json();
                
                if (data.success) {
                    displaySearchResults(data.results);
                } else {
                    showError('searchResults', data.error);
                }
            } catch (error) {
                showError('searchResults', 'Ошибка: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Найти';
            }
        }

        function displaySearchResults(results) {
            const container = document.getElementById('searchResults');
            
            if (results.length === 0) {
                container.innerHTML = '<div class="error-message">Ничего не найдено</div>';
                return;
            }

            let html = '';
            results.forEach((r, i) => {
                html += `
                    <div class="result-item">
                        <div class="result-header">
                            <div>
                                <div class="result-book">📖 ${r.book}</div>
                                <div class="result-position">${r.position || ''}</div>
                            </div>
                            <div class="result-similarity">${r.similarity}% схожесть</div>
                        </div>
                        <div class="result-content">${r.content}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Answer
        async function getAnswer() {
            const question = document.getElementById('answerQuery').value.trim();
            if (!question) return;

            const btn = document.getElementById('answerBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>';

            try {
                const response = await fetch('/api/answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, k: 5 })
                });

                const data = await response.json();
                
                if (data.success) {
                    displayAnswer(data);
                } else {
                    showError('answerResult', data.error);
                }
            } catch (error) {
                showError('answerResult', 'Ошибка: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Ответить';
            }
        }

        function displayAnswer(data) {
            const container = document.getElementById('answerResult');
            
            if (!data.found) {
                container.innerHTML = `
                    <div class="error-message">
                        ❌ ${data.answer}
                    </div>
                `;
                return;
            }
            
            let html = `
                <div class="answer-box">
                    <h3 style="margin-bottom: 15px; color: var(--primary);">💬 Ответ:</h3>
                    <div class="answer-text" style="line-height: 1.8; font-size: 1.05rem;">${data.answer || '⚠️ Не удалось сгенерировать ответ'}</div>
            `;

            if (data.quotes && data.quotes.length > 0) {
                html += '<div class="quotes"><h4 style="margin-bottom: 15px; color: var(--secondary);">📑 Источники из книг:</h4>';
                data.quotes.forEach((q, i) => {
                    html += `
                        <div class="quote-item">
                            <div class="quote-source">${i + 1}. ${q.source}</div>
                            <div class="quote-text">"${q.text}"</div>
                        </div>
                    `;
                });
                html += '</div>';
            }

            html += '</div>';
            container.innerHTML = html;
        }

        // Upload
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) uploadFile(file);
        }

        function handleDrop(event) {
            event.preventDefault();
            event.target.classList.remove('dragover');
            const file = event.dataTransfer.files[0];
            if (file) uploadFile(file);
        }

        function handleDragOver(event) {
            event.preventDefault();
            event.target.classList.add('dragover');
        }

        function handleDragLeave(event) {
            event.target.classList.remove('dragover');
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            const resultDiv = document.getElementById('uploadResult');
            resultDiv.innerHTML = '<div class="status-bar"><span class="loading"></span> Загрузка...</div>';

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success-message">
                            ✅ ${data.message}<br>
                            <button class="btn" onclick="reindex()" style="margin-top: 10px;">
                                🔄 Проиндексировать и добавить в поиск
                            </button>
                        </div>
                    `;
                    loadBooks();
                } else {
                    showError('uploadResult', data.error);
                }
            } catch (error) {
                showError('uploadResult', 'Ошибка: ' + error.message);
            }
        }

        async function reindex() {
            const resultDiv = document.getElementById('uploadResult');
            resultDiv.innerHTML = '<div class="status-bar"><span class="loading"></span> Индексация...</div>';

            try {
                await fetch('/api/reindex', { method: 'POST' });
                
                // Poll for completion
                const pollInterval = setInterval(async () => {
                    const status = await fetch('/api/indexing-status').then(r => r.json());
                    if (!status.indexing) {
                        clearInterval(pollInterval);
                        resultDiv.innerHTML = '<div class="success-message">✅ Индексация завершена!</div>';
                        // Reload RAG
                        setTimeout(() => location.reload(), 2000);
                    }
                }, 2000);
            } catch (error) {
                showError('uploadResult', 'Ошибка: ' + error.message);
            }
        }

        // Load books
        async function loadBooks() {
            try {
                const response = await fetch('/api/books');
                const data = await response.json();
                
                const container = document.getElementById('bookList');
                
                if (data.books.length === 0) {
                    container.innerHTML = '<div class="error-message">Нет загруженных книг</div>';
                    return;
                }

                let html = '';
                data.books.forEach(book => {
                    html += `
                        <div class="book-item">
                            <div>
                                <div class="book-name">📄 ${book.name}</div>
                                <div class="book-size">${book.size_mb} MB</div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading books:', error);
            }
        }

        // Check indexing status
        async function checkIndexingStatus() {
            try {
                const response = await fetch('/api/indexing-status');
                const data = await response.json();
                
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                
                if (data.indexing) {
                    dot.classList.add('indexing');
                    text.textContent = 'Идет индексация...';
                } else {
                    dot.classList.remove('indexing');
                    text.textContent = 'Система готова';
                }
            } catch (error) {
                console.error('Error checking status:', error);
            }
        }

        // Utility
        function showError(containerId, message) {
            document.getElementById(containerId).innerHTML = 
                `<div class="error-message">❌ ${message}</div>`;
        }

        // Initialize
        loadBooks();
        setInterval(checkIndexingStatus, 3000);
    </script>
</body>
</html>
